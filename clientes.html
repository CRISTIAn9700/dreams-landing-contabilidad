<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dreams – Clientes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/png" href="assets/img/favicon-dreams.png">
    <link rel="apple-touch-icon" href="assets/img/favicon-dreams.png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/accounting.css?v=sidebar8">
</head>
<body>
    <div class="app-shell">
        <aside class="accounting-sidebar">
            <button class="sidebar-toggle" type="button" aria-label="Ocultar menú de contabilidad" aria-expanded="true"><span></span><span></span></button>
            <a class="brand" href="index.html"><img src="assets/img/logo-dreams-conta.png" alt="Dreams Contabilidad"></a>
            <nav class="side-nav" aria-label="Navegación de contabilidad"><a href="contabilidad.html">Visión general</a><a href="ventas.html">Ventas</a><a href="gastos.html">Gastos</a><a href="clientes.html" class="active">Clientes</a><a href="productos.html">Productos</a><a href="balance.html">Balance</a></nav>
            <div class="sidebar-foot"><span>Periodo activo</span><strong id="activePeriodLabel">Todos</strong><a href="index.html" class="ghost-link">Volver al inicio</a></div>
        </aside>
        <main class="accounting-main">
            <header class="accounting-header"><div><div class="section-label"><span>Relaciones</span></div><h1>Clientes</h1><p>Centraliza contactos y conecta cada venta con una relación comercial clara.</p></div><div class="header-panel"><div class="ecuador-clock"><span>Tulcán, Ecuador</span><strong id="ecuadorTime">--:--</strong><small id="ecuadorDate">Fecha actual</small></div></div></header>
            <section class="content-grid">
                <article class="panel reveal-up">
                    <div class="panel-head"><div><span class="mini-label">Nuevo contacto</span><h2>Agregar cliente</h2></div></div>
                    <form class="data-form compact" id="clientForm">
                        <label>Nombre <input type="text" name="name" required></label>
                        <label>País <input type="text" name="country" placeholder="Ecuador"></label>
                        <label>Contacto <input type="text" name="contact" placeholder="Correo o teléfono"></label>
                        <button class="pill-button light" type="submit">Agregar cliente</button>
                    </form>
                </article>
                <article class="panel reveal-up">
                    <div class="panel-head"><div><span class="mini-label">Base activa</span><h2>Listado de clientes</h2></div></div>
                    <div class="list-stack" id="clientsList"></div>
                </article>
            </section>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase-config.js"></script>
    <script src="assets/js/supabase-client.js"></script>
    <script src="assets/js/accounting.js?v=security1"></script>
</body>
</html>
